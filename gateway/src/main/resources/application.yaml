spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          # Gateway Routes - Discovery-based routing
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          # Explicit routes for better control
          routes:
            - id: poll-service
              uri: lb://poll-service
              predicates:
                - Path=/poll-service/**
              filters:
                - StripPrefix=1
            - id: results-service
              uri: lb://results-service
              predicates:
                - Path=/results-service/**
              filters:
                - StripPrefix=1
            - id: poll-ui-js
              uri: lb://poll-ui-js
              predicates:
                - Path=/**
              order: 999

server:
  port: 8080

# Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Circuit Breaker
resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        sliding-window-size: 10

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
