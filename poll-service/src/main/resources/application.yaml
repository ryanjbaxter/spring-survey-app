spring:
  application:
    name: poll-service
  # Config Server
  config:
    import: optional:configserver:http://localhost:8888
  # Database
  datasource:
    url: jdbc:h2:mem:polls
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  # Spring Cloud Stream
  cloud:
    stream:
      bindings:
        pollSubmitted-out-0:
          destination: poll-events
          content-type: application/json

server:
  port: 8081

# Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,circuitbreakers
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    io.spring.sample: DEBUG
